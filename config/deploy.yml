<% app_host = ENV.fetch("KAMAL_APP_HOST", "blog.example.com") %>
<% server_ip = ENV.fetch("KAMAL_SERVER_IP", "195.201.102.131") %>
<% registry_user = ENV.fetch("KAMAL_REGISTRY_USERNAME", "thiagoramos23") %>

service: blog
image: <%= "#{registry_user}/blog" %>

servers:
  web:
    - <%= server_ip %>

proxy:
  ssl: true
  host: <%= app_host %>
  app_port: 4000
  forward_headers: true
  healthcheck:
    path: /up
    interval: 3
    timeout: 5

registry:
  username: <%= registry_user %>
  password:
    - KAMAL_REGISTRY_PASSWORD

builder:
  arch: amd64
  remote: <%= "ssh://root@#{server_ip}" %>

deploy_timeout: 30
drain_timeout: 30

env:
  clear:
    PORT: 4000
    MIX_ENV: prod
    PHX_HOST: <%= app_host %>
    PHX_SERVER: "true"
    POOL_SIZE: 10
  secret:
    - DATABASE_URL
    - SECRET_KEY_BASE
    - GITHUB_TOKEN
    - R2_ACCOUNT_ID
    - R2_ACCESS_KEY_ID
    - R2_SECRET_ACCESS_KEY
    - R2_BUCKET
    - R2_PUBLIC_URL
    - R2_UPLOAD_PREFIX

aliases:
  migrate: app exec -p --reuse "/app/bin/migrate"
  console: app exec -i --reuse "/app/bin/blog remote"
  shell: app exec -i --reuse "bash"
  logs: app logs -f

accessories:
  db:
    image: postgres:17
    host: <%= server_ip %>
    env:
      clear:
        POSTGRES_USER: "postgres"
        POSTGRES_DB: "blog_prod"
      secret:
        - POSTGRES_PASSWORD
    directories:
      - data:/var/lib/postgresql/data
